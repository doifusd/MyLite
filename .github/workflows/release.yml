name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.get_release_notes.outputs.content }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get release notes
        id: get_release_notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            content=$(cat RELEASE_NOTES.md)
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$content" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=See GitHub releases for details" >> $GITHUB_OUTPUT
          fi

  publish-tauri:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon (M1/M2/M3/M4)
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04' # Linux
            args: ''
          - platform: 'windows-latest' # Windows
            args: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MyLite ${{ github.ref_name }}'
          releaseBody: ${{ needs.prepare-release.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-summary:
    needs: publish-tauri
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get release version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Summary
        run: |
          echo "## 🎉 Release Build Complete"
          echo ""
          echo "### Version: ${{ steps.version.outputs.version }}"
          echo "### Status: ✅ All platforms compiled successfully"
          echo ""
          echo "### Compiled for:"
          echo "- ✅ macOS (Apple Silicon - aarch64)"
          echo "- ✅ macOS (Intel - x86_64)"
          echo "- ✅ Linux (ubuntu-22.04)"
          echo "- ✅ Windows (latest)"
          echo ""
          echo "### Download:"
          echo "Visit [Releases](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}) to download installers for your platform."
          echo ""
          echo "### Build Artifacts:"
          echo "- macOS: `.dmg` or `.app.tar.gz`"
          echo "- Windows: `.exe` or `.msi`"
          echo "- Linux: `.deb` or `.AppImage`"

