name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # M系列芯片 (Apple Silicon)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-13' # Intel 芯片
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # Linux
            args: ''
          - platform: 'windows-latest' # Windows
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust 编译链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: 安装 Ubuntu 依赖库 (仅针对 Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: 安装前端依赖 (npm)
        run: npm install

      - name: 编译全平台 Tauri App 并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'MyLite v__VERSION__'
          releaseBody: '全平台发布版本，请根据您的操作系统下载对应的安装包：
- **Mac (M1/M2/M3)**: 下载 `.dmg` 文件
- **Mac (Intel)**: 下载对应的 `.dmg` 或 `.app.tar.gz` 文件
- **Windows**: 下载 `.exe` 或 `.msi` 安装包
- **Linux**: 下载 `.deb` 或 `.AppImage` 文件'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
